<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <!-- Verknüpfung zur CSS-Datei -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Menü-Button oben rechts -->
    <button class="menu-toggle" id="menuToggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Das ausklappbare Einstellungsmenü -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-item">
            <span id="text-lightmode">Light Mode</span>
            <label class="switch">
                <input type="checkbox" id="themeSwitch">
                <span class="slider"></span>
            </label>
        </div>
        <div class="sidebar-item">
            <span id="text-voice">Voice Sprachausgabe</span>
            <label class="switch">
                <input type="checkbox" id="voiceSwitch" checked>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="content-wrapper">
        <h1 id="text-title">ROBLOX MENÜ</h1>
        <div id="button-container"></div>
    </div>
  
    <footer class="copyright-box">
        <p style="margin: 0;">&copy; 2026 Starcode. <span id="text-copyright">Alle Rechte vorbehalten.</span></p>
    </footer>

    <!-- Verknüpfung zur JS-Datei -->
    <script src="script.js"></script>
</body>
</html>
